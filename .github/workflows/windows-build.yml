name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build application
        shell: cmd
        run: |
          cmake -S . -B build-win -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=%Qt6_DIR%
          cmake --build build-win

      - name: Prepare release directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "build-win\src\glate.exe" -Destination "release\Glate.exe"

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          cd release
          windeployqt --release Glate.exe

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: glate-windows-portable
          path: release/*

