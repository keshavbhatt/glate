app-id: com.ktechpit.glate
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: glate

finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man

modules:
  - name: glate
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: dir
        path: .

