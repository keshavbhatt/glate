name: glate
version: '3.1'
summary: Google translator for Linux desktop
description: |
  Glate is a desktop translator with text-to-speech support, line-by-line
  translation, and sharing/export tools.

grade: stable
confinement: strict
icon: snap/gui/icon.png
base: core24
compression: lzo

platforms:
  amd64:
  arm64:

apps:
  glate:
    command: usr/bin/glate
    desktop: usr/share/applications/com.ktechpit.glate.desktop
    common-id: com.ktechpit.glate
    extensions:
      - kde-neon-6
    environment:
      IS_SNAP: '1'
    plugs:
      - home
      - network
      - opengl
      - x11
      - wayland
      - audio-playback
      - desktop
      - desktop-legacy

parts:
  glate:
    source: src
    plugin: cmake
    build-packages:
      - libx11-dev
      - libxcb1-dev
      - libx11-xcb-dev
      - pkg-config
    stage-packages:
      - ffmpeg
      - libx11-6
      - libxcb1
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
    override-build: |
      craftctl default

      mkdir -p ${CRAFT_PART_INSTALL}/meta/gui
      cp ${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/512x512/apps/com.ktechpit.glate.png \
         ${CRAFT_PART_INSTALL}/meta/gui/icon.png

      sed -i \
        "s|^Icon=.*|Icon=${SNAP}/meta/gui/icon.png|" \
        ${CRAFT_PART_INSTALL}/usr/share/applications/com.ktechpit.glate.desktop

    prime:
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/share/man
      - -usr/share/lintian
